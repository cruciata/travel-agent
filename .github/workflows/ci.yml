name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -c "from main import ReActAgent; from tools import *; print('✅ 所有模块导入成功')"
        python -c "
from main import ReActAgent
from tools import get_weather, get_crowd, plan_route, calculate_time, recommend_food

agent = ReActAgent(2000, ['故宫', '长城'], 2, True)
agent.register_tool('get_weather', get_weather)
agent.register_tool('get_crowd', get_crowd)
agent.register_tool('plan_route', plan_route)
agent.register_tool('calculate_time', calculate_time)
agent.register_tool('recommend_food', recommend_food)
result = agent.run()
print('✅ ReAct Agent测试通过')
print(f\"路线: {' → '.join(result['route'])}\")
"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Streamlit Cloud
      run: |
        echo "🚀 项目已准备好部署到Streamlit Cloud"
        echo "请访问 https://share.streamlit.io 并连接此GitHub仓库"
